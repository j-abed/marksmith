<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Marksmith — local Markdown editor where Markdown is the canonical source of truth."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Marksmith" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <title>Marksmith</title>
    <script>
      (function () {
        var stored = localStorage.getItem('marksmith:theme')
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
        document.documentElement.dataset.theme = theme
        document.documentElement.style.colorScheme = theme
        var meta = document.querySelector('meta[name="theme-color"]')
        if (meta) meta.content = theme === 'dark' ? '#0f1117' : '#f7f8fa'
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
